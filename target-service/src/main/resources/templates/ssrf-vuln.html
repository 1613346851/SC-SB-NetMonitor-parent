<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">SSRF服务端请求伪造漏洞测试平台</title>
    <link rel="stylesheet" th:href="@{/css/ssrf-vuln.css}">
    <link href="https://cdn.staticfile.org/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100 p-0">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top" th:replace="~{fragments/navbar :: navbar('SSRF服务端请求伪造')}"></nav>

    <div class="row g-0 h-100">
        <div class="col-md-4 col-lg-3 sidebar sidebar-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-cog me-2"></i>
                    <h5 class="mb-0 fw-bold">请求控制台</h5>
                </div>
                <div class="card-body">
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-info-circle me-2"></i>漏洞原理
                        </h6>
                        <div class="info-section">
                            <div class="info-item">
                                <span class="badge bg-danger">漏洞类型</span>
                                <span class="ms-3 text-dark">Server-Side Request Forgery</span>
                            </div>
                            <div class="info-item mt-2">
                                <span class="badge bg-warning">攻击方式</span>
                                <span class="ms-3 text-dark">服务器代为发起请求</span>
                            </div>
                            <div class="info-item mt-2">
                                <span class="badge bg-info">危害等级</span>
                                <span class="ms-3 text-dark">高危（内网渗透）</span>
                            </div>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-check-circle me-2 text-success"></i>基础功能验证
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-primary btn-sm" onclick="makeRequest('http://localhost:9001/target/ddos/status')">
                                <i class="fas fa-server me-1"></i>DDoS状态
                            </button>
                            <button class="btn btn-outline-primary btn-sm" onclick="makeRequest('http://127.0.0.1:9001/target/path/list-files')">
                                <i class="fas fa-file me-1"></i>文件列表
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-bug me-2 text-danger"></i>SSRF攻击测试
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-danger btn-sm" onclick="makeRequest('http://localhost:9001/target/sql/query?id=1')">
                                <i class="fas fa-database me-1"></i>内网SQL接口
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="makeRequest('http://127.0.0.1:9001/target/xss/list-comments')">
                                <i class="fas fa-comment me-1"></i>内网XSS接口
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="makeRequest('http://[::1]:9001/target/ddos/ping')">
                                <i class="fas fa-ipv6 me-1"></i>IPv6回环
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-shield-alt me-2 text-success"></i>安全防护测试
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-success btn-sm" onclick="safeRequest('http://localhost:9001/target/ddos/status')">
                                <i class="fas fa-lock me-1"></i>安全请求本地
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="safeRequest('http://evil.com/api/data')">
                                <i class="fas fa-ban me-1"></i>测试外网拦截
                            </button>
                        </div>
                    </div>

                    <div class="section mb-3">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-keyboard me-2"></i>自定义URL
                        </h6>
                        <div class="mb-3">
                            <label for="urlInput" class="form-label fw-medium">
                                <i class="fas fa-link me-1"></i>目标URL:
                            </label>
                            <input type="text" class="form-control" id="urlInput"
                                   placeholder="输入目标URL..." value="http://localhost:9001/target/ddos/status">
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-danger" type="button" id="vulnRequestBtn">
                                <i class="fas fa-skull me-2"></i>漏洞请求
                            </button>
                            <button class="btn btn-success" type="button" id="safeRequestBtn">
                                <i class="fas fa-shield-alt me-2"></i>安全请求
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-database me-2 text-info"></i>数据库操作
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-info btn-sm" onclick="getSsrfLogs()">
                                <i class="fas fa-list me-1"></i>查看请求日志
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="resetDatabase()">
                                <i class="fas fa-sync me-1"></i>重置数据表
                            </button>
                        </div>
                        <div id="dbStatus" class="mt-2">
                            <small class="text-muted">日志数量: <span id="logCount">0</span></small>
                        </div>
                    </div>

                    <div class="section">
                        <button class="btn btn-outline-secondary w-100 py-2" onclick="clearOutput()">
                            <i class="fas fa-trash-alt me-2"></i>清空结果
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8 col-lg-9 main-content main-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-scroll me-2"></i>
                        <h5 class="mb-0 fw-bold">请求响应结果</h5>
                    </div>
                    <div>
                        <span id="statusIndicator" class="badge bg-secondary">
                            <i class="fas fa-circle-notch fa-spin me-1"></i>就绪
                        </span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="outputContainer" class="output-container">
                        <div class="welcome-message text-center text-muted d-flex flex-column justify-content-center align-items-center h-100">
                            <i class="fas fa-network-wired fa-4x mb-4 text-primary"></i>
                            <h4 class="fw-bold text-dark">欢迎使用SSRF漏洞测试平台</h4>
                            <p class="mb-0 lead">请输入目标URL或点击测试用例开始请求测试</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">请求中...</span>
    </div>
    <p class="mt-3 text-white fw-medium">请求发送中，请稍候...</p>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/ssrf-vuln.js}"></script>
<script src="https://cdn.staticfile.org/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
