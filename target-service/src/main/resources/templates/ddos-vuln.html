<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">DDoS攻击模拟靶场</title>
    <link rel="stylesheet" th:href="@{/css/ddos-vuln.css}">
    <link href="https://cdn.staticfile.org/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100 p-0">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top" th:replace="~{fragments/navbar :: navbar('DDoS攻击模拟')}"></nav>

    <div class="row g-0 h-100">
        <!-- 左侧控制面板 -->
        <div class="col-md-4 col-lg-3 sidebar sidebar-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-cog me-2"></i>
                    <h5 class="mb-0 fw-bold">攻击控制台</h5>
                </div>
                <div class="card-body">
                    <!-- 系统信息显示 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-info-circle me-2"></i>靶场信息
                        </h6>
                        <div class="target-info">
                            <div class="info-item">
                                <span class="badge bg-secondary">攻击类型</span>
                                <span class="ms-3 text-dark fw-medium">DDoS分布式拒绝服务</span>
                            </div>
                            <div class="info-item">
                                <span class="badge bg-secondary">测试目标</span>
                                <span class="ms-3 text-dark fw-medium">模拟高负载Web服务</span>
                            </div>
                            <div class="info-item">
                                <span class="badge bg-secondary">状态监控</span>
                                <span id="attackStatus" class="ms-3 text-success fw-medium">准备就绪</span>
                            </div>
                        </div>
                    </div>

                    <!-- 攻击配置区域 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-sliders-h me-2"></i>攻击参数配置
                        </h6>
                        <div class="attack-config p-3 bg-light rounded border">
                            <div class="mb-3">
                                <label for="concurrentRequests" class="form-label fw-medium mb-2">
                                    <i class="fas fa-tachometer-alt me-1"></i>并发请求数:
                                </label>
                                <input type="range" class="form-range" id="concurrentRequests" min="1" max="100" value="10">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">1</small>
                                    <span class="badge bg-primary" id="concurrentDisplay">10</span>
                                    <small class="text-muted">100</small>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="attackDuration" class="form-label fw-medium mb-2">
                                    <i class="fas fa-stopwatch me-1"></i>攻击持续时间 (秒):
                                </label>
                                <input type="range" class="form-range" id="attackDuration" min="5" max="300" value="30">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">5s</small>
                                    <span class="badge bg-info" id="durationDisplay">30s</span>
                                    <small class="text-muted">300s</small>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="requestInterval" class="form-label fw-medium mb-2">
                                    <i class="fas fa-wave-square me-1"></i>请求间隔 (毫秒):
                                </label>
                                <input type="range" class="form-range" id="requestInterval" min="0" max="1000" value="100">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">0ms</small>
                                    <span class="badge bg-warning" id="intervalDisplay">100ms</span>
                                    <small class="text-muted">1000ms</small>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="batchRequestCount" class="form-label fw-medium mb-2">
                                    <i class="fas fa-list-ol me-1"></i>批量攻击请求数:
                                </label>
                                <input type="range" class="form-range" id="batchRequestCount" min="10" max="1000" value="50">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">10</small>
                                    <span class="badge bg-info" id="batchCountDisplay">50</span>
                                    <small class="text-muted">1000</small>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="highFreqRequestCount" class="form-label fw-medium mb-2">
                                    <i class="fas fa-bolt me-1"></i>高频攻击请求数:
                                </label>
                                <input type="range" class="form-range" id="highFreqRequestCount" min="100" max="5000" value="1000">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">100</small>
                                    <span class="badge bg-danger" id="highFreqCountDisplay">1000</span>
                                    <small class="text-muted">5000</small>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="maxConcurrentLimit" class="form-label fw-medium mb-2">
                                    <i class="fas fa-tasks me-1"></i>最大并发请求数:
                                </label>
                                <input type="range" class="form-range" id="maxConcurrentLimit" min="1" max="200" value="50">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">1</small>
                                    <span class="badge bg-success" id="maxConcurrentDisplay">50</span>
                                    <small class="text-muted">200</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- CPU密集型攻击测试用例 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-microchip me-2 text-danger"></i>CPU密集型攻击
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-danger btn-sm" onclick="executeDdosAttack('/target/ddos/compute-heavy', 'CPU密集型计算')">
                                <i class="fas fa-calculator me-1"></i>斐波那契计算
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="executeBatchAttackWithConfig()">
                                <i class="fas fa-layer-group me-1"></i>批量计算
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="executeStressTest('cpu', 20, 60, 'CPU压力测试')">
                                <i class="fas fa-fire me-1"></i>持续压力
                            </button>
                        </div>
                    </div>

                    <!-- I/O延迟型攻击测试用例 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-clock me-2 text-info"></i>I/O延迟型攻击
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-info btn-sm" onclick="executeDdosAttack('/target/ddos/io-delay?delay=1000', 'I/O延迟1秒')">
                                <i class="fas fa-hourglass-start me-1"></i>1秒延迟
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="executeDdosAttack('/target/ddos/io-delay?delay=5000', 'I/O延迟5秒')">
                                <i class="fas fa-hourglass-half me-1"></i>5秒延迟
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="executeDdosAttack('/target/ddos/io-delay?delay=10000', 'I/O延迟10秒')">
                                <i class="fas fa-hourglass-end me-1"></i>10秒延迟
                            </button>
                        </div>
                    </div>

                    <!-- 洪水攻击测试用例 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-water me-2 text-primary"></i>洪水攻击
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-primary btn-sm" onclick="executeDdosAttack('/target/ddos/ping', '简单Ping洪水')">
                                <i class="fas fa-bullseye me-1"></i>Ping攻击
                            </button>
                            <button class="btn btn-outline-primary btn-sm" onclick="executeHighFrequencyAttack('/target/ddos/ping', 1000, '高频Ping洪水')">
                                <i class="fas fa-bolt me-1"></i>高频攻击
                            </button>

                        </div>
                    </div>

                    <!-- 状态查询测试用例 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-chart-bar me-2 text-success"></i>状态监控
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-success btn-sm" onclick="checkAttackStatus()">
                                <i class="fas fa-heartbeat me-1"></i>实时状态
                            </button>
                            <button class="btn btn-outline-success btn-sm" onclick="getSystemMetrics()">
                                <i class="fas fa-tasks me-1"></i>系统指标
                            </button>
                        </div>
                    </div>

                    <!-- 自定义攻击区域 -->
                    <div class="section mb-3">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-edit me-2"></i>自定义攻击
                        </h6>
                        <div class="mb-3">
                            <label for="customEndpoint" class="form-label fw-medium">
                                <i class="fas fa-link me-1"></i>攻击端点:
                            </label>
                            <input type="text" class="form-control" id="customEndpoint"
                                   placeholder="/target/ddos/..." value="/target/ddos/ping">
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-danger btn-lg" type="button" id="customAttackBtn">
                                <i class="fas fa-skull me-2"></i>发起自定义攻击
                            </button>
                        </div>
                        <div class="form-text text-muted mt-3">
                            <small>
                                <i class="fas fa-exclamation-triangle text-warning me-1"></i>
                                请注意控制攻击强度，避免影响其他服务
                            </small>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="section">
                        <button class="btn btn-outline-secondary w-100 py-2" onclick="clearAttackLog()">
                            <i class="fas fa-trash-alt me-2"></i>清空攻击日志
                        </button>
                        <button class="btn btn-outline-info w-100 py-2 mt-2" onclick="exportAttackReport()">
                            <i class="fas fa-file-export me-2"></i>导出攻击报告
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧输出区域 -->
        <div class="col-md-8 col-lg-9 main-content main-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-scroll me-2"></i>
                        <h5 class="mb-0 fw-bold">攻击日志与监控</h5>
                    </div>
                    <div>
                            <span id="statusIndicator" class="badge bg-secondary">
                                <i class="fas fa-circle-notch fa-spin me-1"></i>待命中
                            </span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="attackLogContainer" class="attack-log-container">
                        <div class="welcome-message text-center text-muted d-flex flex-column justify-content-center align-items-center h-100">
                            <i class="fas fa-bolt fa-4x mb-4 text-primary"></i>
                            <h4 class="fw-bold text-dark">欢迎使用DDoS攻击模拟靶场</h4>
                            <p class="mb-0 lead">请选择左侧攻击类型或配置参数开始模拟DDoS攻击测试</p>
                            <div class="mt-4">
                                <i class="fas fa-mouse-pointer text-muted"></i>
                                <small class="ms-2">选择攻击类型或调整攻击参数进行测试</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 加载指示器 -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">攻击进行中...</span>
    </div>
    <p class="mt-3 text-white fw-medium">攻击进行中，请稍候...</p>
    <div class="attack-progress mt-3">
        <div class="progress">
            <div class="progress-bar progress-bar-striped progress-bar-animated"
                 role="progressbar" style="width: 0" id="attackProgress"
                 aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                0%
            </div>
        </div>
        <small class="text-white mt-2" id="progressText">准备启动攻击...</small>
    </div>
</div>

<!-- JavaScript 资源 -->
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/ddos-vuln.js}"></script>
<!-- 使用国内 CDN 加速 -->
<script src="https://cdn.staticfile.org/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
