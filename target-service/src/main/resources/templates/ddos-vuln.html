<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">DDoS攻击模拟靶场</title>
    <link rel="stylesheet" th:href="@{/css/ddos-vuln.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid vh-100">
        <!-- 顶部导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-bolt me-2"></i>
                    <span th:text="${pageTitle}">DDoS攻击模拟靶场</span>
                </a>
                <div class="navbar-nav ms-auto">
                    <span class="navbar-text">
                        <i class="fas fa-shield-alt text-warning"></i>
                        攻击测试环境
                    </span>
                </div>
            </div>
        </nav>

        <div class="row g-0 h-100">
            <!-- 左侧控制面板 -->
            <div class="col-md-4 col-lg-3 sidebar">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white d-flex align-items-center">
                        <i class="fas fa-cog me-2"></i>
                        <h5 class="mb-0 fw-bold">攻击控制台</h5>
                    </div>
                    <div class="card-body">
                        <!-- 系统状态信息 -->
                        <div class="section mb-4">
                            <h6 class="text-muted fw-semibold mb-3">
                                <i class="fas fa-info-circle me-2"></i>系统信息
                            </h6>
                            <div class="system-info">
                                <div class="info-item">
                                    <span class="badge bg-secondary">总请求数</span>
                                    <span id="totalRequests" class="ms-3 text-dark fw-medium">0</span>
                                </div>
                                <div class="info-item mt-2">
                                    <span class="badge bg-secondary">CPU使用率</span>
                                    <span id="cpuUsage" class="ms-3 text-dark fw-medium">0%</span>
                                </div>
                                <div class="info-item mt-2">
                                    <span class="badge bg-secondary">内存使用</span>
                                    <span id="memoryUsage" class="ms-3 text-dark fw-medium">0MB</span>
                                </div>
                            </div>
                        </div>

                        <!-- CPU密集型测试用例 -->
                        <div class="section mb-4">
                            <div class="test-category mb-4">
                                <h6 class="text-muted fw-semibold mb-3">
                                    <i class="fas fa-microchip me-2 text-primary"></i>CPU密集型攻击
                                </h6>
                                <div class="test-cases-grid">
                                    <button class="btn btn-outline-primary btn-sm" onclick="executeDdosTest('/target/ddos/compute-heavy', 'TC001')">
                                        <i class="fas fa-calculator me-1"></i>单次调用
                                    </button>
                                    <button class="btn btn-outline-primary btn-sm" onclick="executeMultipleCalls('/target/ddos/compute-heavy', 3, 'TC002')">
                                        <i class="fas fa-sync me-1"></i>连续3次
                                    </button>
                                    <button class="btn btn-outline-warning btn-sm" onclick="startStressTest('/target/ddos/compute-heavy', 10, 60, 'TC003')">
                                        <i class="fas fa-fire me-1"></i>10并发/1分钟
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="startStressTest('/target/ddos/compute-heavy', 100, 600, 'TC004')">
                                        <i class="fas fa-skull me-1"></i>100并发/10分钟
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- I/O延迟测试用例 -->
                        <div class="section mb-4">
                            <div class="test-category mb-4">
                                <h6 class="text-muted fw-semibold mb-3">
                                    <i class="fas fa-clock me-2 text-info"></i>I/O延迟攻击
                                </h6>
                                <div class="test-cases-grid">
                                    <button class="btn btn-outline-info btn-sm" onclick="executeDdosTest('/target/ddos/io-delay', 'TC005')">
                                        <i class="fas fa-hourglass-half me-1"></i>默认延迟
                                    </button>
                                    <button class="btn btn-outline-info btn-sm" onclick="executeDdosTest('/target/ddos/io-delay?delay=10000', 'TC006')">
                                        <i class="fas fa-hourglass-end me-1"></i>最大延迟
                                    </button>
                                    <button class="btn btn-outline-warning btn-sm" onclick="executeDdosTest('/target/ddos/io-delay?delay=15000', 'TC007')">
                                        <i class="fas fa-exclamation-triangle me-1"></i>超限延迟
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="executeDdosTest('/target/ddos/io-delay?delay=-500', 'TC008')">
                                        <i class="fas fa-minus-circle me-1"></i>负数延迟
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="executeDdosTest('/target/ddos/io-delay?delay=abc', 'TC009')">
                                        <i class="fas fa-font me-1"></i>非法参数
                                    </button>
                                    <button class="btn btn-outline-warning btn-sm" onclick="startConnectionTest('/target/ddos/io-delay?delay=5000', 50, 'TC010')">
                                        <i class="fas fa-network-wired me-1"></i>50并发连接
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Ping洪水测试用例 -->
                        <div class="section mb-4">
                            <div class="test-category mb-4">
                                <h6 class="text-muted fw-semibold mb-3">
                                    <i class="fas fa-water me-2 text-success"></i>Ping洪水攻击
                                </h6>
                                <div class="test-cases-grid">
                                    <button class="btn btn-outline-success btn-sm" onclick="executeDdosTest('/target/ddos/ping', 'TC011')">
                                        <i class="fas fa-ping-pong-paddle-ball me-1"></i>单次Ping
                                    </button>
                                    <button class="btn btn-outline-warning btn-sm" onclick="startHighFrequencyTest('/target/ddos/ping', 10000, 1, 'TC012')">
                                        <i class="fas fa-wave-square me-1"></i>10000QPS/1秒
                                    </button>
                                    <button class="btn btn-outline-warning btn-sm" onclick="startHighFrequencyTest('/target/ddos/ping', 5000, 3600, 'TC013')">
                                        <i class="fas fa-infinity me-1"></i>5000QPS/1小时
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="startExtremeTest('/target/ddos/ping', 20000, 'TC014')">
                                        <i class="fas fa-bomb me-1"></i>极限20000QPS
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 状态查询测试用例 -->
                        <div class="section mb-4">
                            <div class="test-category">
                                <h6 class="text-muted fw-semibold mb-3">
                                    <i class="fas fa-search me-2 text-secondary"></i>状态查询
                                </h6>
                                <div class="test-cases-grid">
                                    <button class="btn btn-outline-secondary btn-sm" onclick="executeDdosTest('/target/ddos/status', 'TC015')">
                                        <i class="fas fa-info-circle me-1"></i>初始状态
                                    </button>
                                    <button class="btn btn-outline-secondary btn-sm" onclick="testConsistency('TC016')">
                                        <i class="fas fa-balance-scale me-1"></i>一致性测试
                                    </button>
                                    <button class="btn btn-outline-secondary btn-sm" onclick="testConcurrentCalls('TC017')">
                                        <i class="fas fa-users me-1"></i>并发一致性
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 自定义攻击区域 -->
                        <div class="section mb-3">
                            <h6 class="text-muted fw-semibold mb-3">
                                <i class="fas fa-sliders-h me-2"></i>自定义攻击
                            </h6>
                            <div class="mb-3">
                                <label for="customEndpoint" class="form-label fw-medium">
                                    <i class="fas fa-link me-1"></i>攻击端点:
                                </label>
                                <select class="form-select" id="customEndpoint">
                                    <option value="/target/ddos/compute-heavy">/target/ddos/compute-heavy (CPU密集型)</option>
                                    <option value="/target/ddos/io-delay">/target/ddos/io-delay (I/O延迟)</option>
                                    <option value="/target/ddos/ping">/target/ddos/ping (Ping洪水)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="concurrentThreads" class="form-label fw-medium">
                                    <i class="fas fa-project-diagram me-1"></i>并发线程数:
                                </label>
                                <input type="range" class="form-range" id="concurrentThreads" min="1" max="100" value="10">
                                <div class="d-flex justify-content-between">
                                    <small class="text-muted">1</small>
                                    <span id="threadCountDisplay" class="badge bg-primary">10</span>
                                    <small class="text-muted">100</small>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="attackDuration" class="form-label fw-medium">
                                    <i class="fas fa-clock me-1"></i>攻击持续时间(秒):
                                </label>
                                <input type="number" class="form-control" id="attackDuration" min="1" max="3600" value="10">
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-danger btn-lg" type="button" id="startCustomAttackBtn">
                                    <i class="fas fa-fighter-jet me-2"></i>开始自定义攻击
                                </button>
                                <button class="btn btn-outline-secondary" type="button" id="stopAttackBtn" disabled>
                                    <i class="fas fa-stop me-2"></i>停止攻击
                                </button>
                            </div>
                        </div>

                        <!-- 操作按钮 -->
                        <div class="section">
                            <button class="btn btn-outline-secondary w-100 py-2" onclick="clearOutput()">
                                <i class="fas fa-trash-alt me-2"></i>清空输出
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧输出区域 -->
            <div class="col-md-8 col-lg-9 main-content">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-scroll me-2"></i>
                            <h5 class="mb-0 fw-bold">攻击结果监控</h5>
                        </div>
                        <div>
                            <span id="statusIndicator" class="badge bg-secondary">
                                <i class="fas fa-circle-notch fa-spin me-1"></i>就绪
                            </span>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="outputContainer" class="output-container">
                            <div class="welcome-message text-center text-muted d-flex flex-column justify-content-center align-items-center h-100">
                                <i class="fas fa-bolt fa-4x mb-4 text-danger"></i>
                                <h4 class="fw-bold text-dark">欢迎使用DDoS攻击模拟靶场</h4>
                                <p class="mb-0 lead">请选择左侧测试用例开始DDoS攻击测试</p>
                                <div class="mt-4">
                                    <i class="fas fa-mouse-pointer text-muted"></i>
                                    <small class="ms-2">选择预设测试用例或配置自定义攻击参数</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载指示器 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">攻击中...</span>
        </div>
        <p class="mt-2 text-white">攻击执行中，请稍候...</p>
    </div>

    <!-- JavaScript资源 -->
    <script th:src="@{/js/ddos-vuln.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
