<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">XXE XML外部实体注入漏洞测试平台</title>
    <link rel="stylesheet" th:href="@{/css/xxe-vuln.css}">
    <link href="https://cdn.staticfile.org/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100 p-0">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top" th:replace="~{fragments/navbar :: navbar('XXE外部实体注入')}"></nav>

    <div class="row g-0 h-100">
        <div class="col-md-4 col-lg-3 sidebar sidebar-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-cog me-2"></i>
                    <h5 class="mb-0 fw-bold">XML解析控制台</h5>
                </div>
                <div class="card-body">
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-info-circle me-2"></i>漏洞原理
                        </h6>
                        <div class="info-section">
                            <div class="info-item">
                                <span class="badge bg-danger">漏洞类型</span>
                                <span class="ms-3 text-dark">XML External Entity</span>
                            </div>
                            <div class="info-item mt-2">
                                <span class="badge bg-warning">攻击方式</span>
                                <span class="ms-3 text-dark">构造恶意XML读取文件</span>
                            </div>
                            <div class="info-item mt-2">
                                <span class="badge bg-info">危害等级</span>
                                <span class="ms-3 text-dark">高危（文件读取/SSRF）</span>
                            </div>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-check-circle me-2 text-success"></i>基础功能验证
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-primary btn-sm" onclick="loadTestCase('normal')">
                                <i class="fas fa-file-alt me-1"></i>正常XML
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-bug me-2 text-danger"></i>XXE攻击测试
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-danger btn-sm" onclick="loadTestCase('xxe_file_read')">
                                <i class="fas fa-file me-1"></i>读取test.txt
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="loadTestCase('xxe_project_config')">
                                <i class="fas fa-folder-tree me-1"></i>读取项目配置文件
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="loadTestCase('xxe_project_file')">
                                <i class="fas fa-file-code me-1"></i>读取pom.xml
                            </button>
                        </div>
                    </div>

                    <div class="section mb-3">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-keyboard me-2"></i>XML内容输入
                        </h6>
                        <div class="mb-3">
                            <label for="xmlInput" class="form-label fw-medium">
                                <i class="fas fa-code me-1"></i>XML内容:
                            </label>
                            <textarea class="form-control" id="xmlInput" rows="10"
                                      placeholder="输入XML内容..." style="font-family: monospace; font-size: 0.85rem;"></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-danger" type="button" id="vulnParseBtn">
                                <i class="fas fa-skull me-2"></i>漏洞解析
                            </button>
                            <button class="btn btn-success" type="button" id="safeParseBtn">
                                <i class="fas fa-shield-alt me-2"></i>安全解析
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-database me-2 text-info"></i>数据库操作
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-info btn-sm" onclick="getXxeLogs()">
                                <i class="fas fa-list me-1"></i>查看解析日志
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="resetDatabase()">
                                <i class="fas fa-sync me-1"></i>重置数据表
                            </button>
                        </div>
                        <div id="dbStatus" class="mt-2">
                            <small class="text-muted">日志数量: <span id="logCount">0</span></small>
                        </div>
                    </div>

                    <div class="section">
                        <button class="btn btn-outline-secondary w-100 py-2" onclick="clearOutput()">
                            <i class="fas fa-trash-alt me-2"></i>清空结果
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8 col-lg-9 main-content main-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-scroll me-2"></i>
                        <h5 class="mb-0 fw-bold">解析结果展示</h5>
                    </div>
                    <div>
                        <span id="statusIndicator" class="badge bg-secondary">
                            <i class="fas fa-circle-notch fa-spin me-1"></i>就绪
                        </span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="outputContainer" class="output-container">
                        <div class="welcome-message text-center text-muted d-flex flex-column justify-content-center align-items-center h-100">
                            <i class="fas fa-code fa-4x mb-4 text-primary"></i>
                            <h4 class="fw-bold text-dark">欢迎使用XXE漏洞测试平台</h4>
                            <p class="mb-0 lead">请输入XML内容或点击测试用例开始解析测试</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">解析中...</span>
    </div>
    <p class="mt-3 text-white fw-medium">XML解析中，请稍候...</p>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/xxe-vuln.js}"></script>
<script src="https://cdn.staticfile.org/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
