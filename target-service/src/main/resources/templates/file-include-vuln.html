<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">文件包含漏洞测试平台</title>
    <link rel="stylesheet" th:href="@{/css/file-include-vuln.css}">
</head>
<body>
<div class="container-fluid vh-100 p-0">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top" th:replace="~{fragments/navbar :: navbar('文件包含')}"></nav>

    <div class="row g-0 h-100">
        <div class="col-md-4 col-lg-3 sidebar sidebar-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-cog me-2"></i>
                    <h5 class="mb-0 fw-bold">文件加载控制台</h5>
                </div>
                <div class="card-body">
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-info-circle me-2"></i>漏洞原理
                        </h6>
                        <div class="info-section">
                            <div class="info-item">
                                <span class="badge bg-danger">漏洞类型</span>
                                <span class="ms-3 text-dark">File Inclusion</span>
                            </div>
                            <div class="info-item mt-2">
                                <span class="badge bg-warning">攻击方式</span>
                                <span class="ms-3 text-dark">加载任意文件内容</span>
                            </div>
                            <div class="info-item mt-2">
                                <span class="badge bg-info">危害等级</span>
                                <span class="ms-3 text-dark">高危（敏感信息泄露）</span>
                            </div>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-check-circle me-2 text-success"></i>基础功能验证
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-primary btn-sm" onclick="includeFile('config/test.properties')">
                                <i class="fas fa-cog me-1"></i>加载配置文件
                            </button>
                            <button class="btn btn-outline-primary btn-sm" onclick="includeFile('test.txt')">
                                <i class="fas fa-file-alt me-1"></i>加载测试文件
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-bug me-2 text-danger"></i>文件包含攻击
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-danger btn-sm" onclick="includeFile('application.yml')">
                                <i class="fas fa-file-code me-1"></i>应用配置
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="includeFile('static/test-files/config/test.properties')">
                                <i class="fas fa-folder-open me-1"></i>遍历目录
                            </button>
                        </div>
                    </div>

                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-shield-alt me-2 text-success"></i>安全防护测试
                        </h6>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-success btn-sm" onclick="safeIncludeFile('config/test.properties')">
                                <i class="fas fa-lock me-1"></i>安全加载配置
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="safeIncludeFile('application.yml')">
                                <i class="fas fa-ban me-1"></i>测试拦截
                            </button>
                        </div>
                    </div>

                    <div class="section mb-3">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-keyboard me-2"></i>自定义文件路径
                        </h6>
                        <div class="mb-3">
                            <label for="filePathInput" class="form-label fw-medium">
                                <i class="fas fa-file me-1"></i>文件路径:
                            </label>
                            <input type="text" class="form-control" id="filePathInput"
                                   placeholder="输入文件路径..." value="config/test.properties">
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-danger" type="button" id="vulnIncludeBtn">
                                <i class="fas fa-skull me-2"></i>漏洞加载
                            </button>
                            <button class="btn btn-success" type="button" id="safeIncludeBtn">
                                <i class="fas fa-shield-alt me-2"></i>安全加载
                            </button>
                        </div>
                    </div>

                    <div class="section">
                        <button class="btn btn-outline-secondary w-100 py-2" onclick="clearOutput()">
                            <i class="fas fa-trash-alt me-2"></i>清空结果
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8 col-lg-9 main-content main-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-scroll me-2"></i>
                        <h5 class="mb-0 fw-bold">文件内容展示</h5>
                    </div>
                    <div>
                        <span id="statusIndicator" class="badge bg-secondary">
                            <i class="fas fa-circle-notch fa-spin me-1"></i>就绪
                        </span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="outputContainer" class="output-container">
                        <div class="welcome-message text-center text-muted d-flex flex-column justify-content-center align-items-center h-100">
                            <i class="fas fa-file-import fa-4x mb-4 text-primary"></i>
                            <h4 class="fw-bold text-dark">欢迎使用文件包含漏洞测试平台</h4>
                            <p class="mb-0 lead">请输入文件路径或点击测试用例开始文件加载测试</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">加载中...</span>
    </div>
    <p class="mt-3 text-white fw-medium">文件加载中，请稍候...</p>
</div>

<script th:src="@{/js/resource-loader.js}"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/file-include-vuln.js}"></script>
<script>
    ResourceLoader.loadAll().then(function() {
        console.log('所有资源加载完成，初始化应用');
    }).catch(function(e) {
        console.warn('部分资源加载失败，但继续初始化:', e);
    });
</script>
</body>
</html>
