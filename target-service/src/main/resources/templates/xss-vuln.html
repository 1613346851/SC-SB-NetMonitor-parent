<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">XSS漏洞测试平台</title>
    <link rel="stylesheet" th:href="@{/css/xss-vuln.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100 p-0">
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fas fa-bug me-3"></i>
                <span th:text="${pageTitle}" class="fw-bold">XSS漏洞测试平台</span>
            </a>
            <div class="navbar-nav ms-auto">
                    <span class="navbar-text d-flex align-items-center">
                        <i class="fas fa-shield-alt text-warning me-2"></i>
                        <span class="fw-medium">安全测试环境</span>
                    </span>
            </div>
        </div>
    </nav>

    <div class="row g-0 h-100">
        <!-- 左侧控制面板 -->
        <div class="col-md-4 col-lg-3 sidebar sidebar-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="fas fa-cog me-2"></i>
                    <h5 class="mb-0 fw-bold">XSS测试控制台</h5>
                </div>
                <div class="card-body">
                    <!-- 漏洞类型说明 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-info-circle me-2"></i>漏洞类型说明
                        </h6>
                        <div class="info-section">
                            <div class="info-item">
                                <span class="badge bg-danger">存储型</span>
                                <span class="ms-3 text-dark">恶意脚本存入数据库，永久生效</span>
                            </div>
                            <div class="info-item">
                                <span class="badge bg-warning">反射型</span>
                                <span class="ms-3 text-dark">URL参数直接反射，一次性触发</span>
                            </div>
                            <div class="info-item">
                                <span class="badge bg-info">DOM型</span>
                                <span class="ms-3 text-dark">前端DOM渲染触发，无需服务器参与</span>
                            </div>
                        </div>
                    </div>

                    <!-- 存储型XSS测试 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-database me-2"></i>存储型XSS测试
                        </h6>
                        <div class="mb-3">
                            <label for="commentInput" class="form-label fw-medium">
                                <i class="fas fa-comment me-1"></i>评论内容:
                            </label>
                            <textarea class="form-control" id="commentInput" rows="3"
                                      placeholder="请输入包含XSS脚本的评论内容..."></textarea>
                        </div>
                        <div class="d-grid gap-2 mb-3">
                            <button class="btn btn-danger" type="button" id="vulnCommentBtn">
                                <i class="fas fa-skull me-2"></i>提交恶意评论
                            </button>
                            <button class="btn btn-success" type="button" id="safeCommentBtn">
                                <i class="fas fa-shield-alt me-2"></i>提交安全评论
                            </button>
                            <button class="btn btn-outline-primary" type="button" id="viewCommentsBtn">
                                <i class="fas fa-eye me-2"></i>查看评论列表
                            </button>
                        </div>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-danger btn-sm" onclick="loadXssTestCase('storage', 'basic')">
                                <i class="fas fa-exclamation me-1"></i>基础弹窗
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="loadXssTestCase('storage', 'cookie')">
                                <i class="fas fa-cookie me-1"></i>窃取Cookie
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="loadXssTestCase('storage', 'phishing')">
                                <i class="fas fa-user-secret me-1"></i>钓鱼攻击
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="loadXssTestCase('storage', 'img')">
                                <i class="fas fa-image me-1"></i>img标签
                            </button>
                        </div>
                    </div>

                    <!-- 反射型XSS测试 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-sync me-2"></i>反射型XSS测试
                        </h6>
                        <div class="mb-3">
                            <label for="searchKeyword" class="form-label fw-medium">
                                <i class="fas fa-search me-1"></i>搜索关键词:
                            </label>
                            <input type="text" class="form-control" id="searchKeyword"
                                   placeholder="请输入包含XSS脚本的搜索词...">
                        </div>
                        <div class="d-grid gap-2 mb-3">
                            <button class="btn btn-warning" type="button" id="reflectiveSearchBtn">
                                <i class="fas fa-search me-2"></i>执行反射搜索
                            </button>
                        </div>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-warning btn-sm" onclick="loadXssTestCase('reflective', 'basic')">
                                <i class="fas fa-bolt me-1"></i>基础弹窗
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="loadXssTestCase('reflective', 'cookie')">
                                <i class="fas fa-cookie-bite me-1"></i>Cookie窃取
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="loadXssTestCase('reflective', 'bypass')">
                                <i class="fas fa-shield me-1"></i>标签闭合
                            </button>
                        </div>
                    </div>

                    <!-- DOM型XSS测试 -->
                    <div class="section mb-4">
                        <h6 class="text-muted fw-semibold mb-3">
                            <i class="fas fa-code me-2"></i>DOM型XSS测试
                        </h6>
                        <div class="mb-3">
                            <label for="usernameInput" class="form-label fw-medium">
                                <i class="fas fa-user me-1"></i>用户名:
                            </label>
                            <input type="text" class="form-control" id="usernameInput"
                                   placeholder="请输入包含XSS脚本的用户名...">
                        </div>
                        <div class="d-grid gap-2 mb-3">
                            <button class="btn btn-info" type="button" id="domProfileBtn">
                                <i class="fas fa-id-card me-2"></i>查看用户资料
                            </button>
                        </div>
                        <div class="test-cases-grid">
                            <button class="btn btn-outline-info btn-sm" onclick="loadXssTestCase('dom', 'basic')">
                                <i class="fas fa-window-maximize me-1"></i>基础弹窗
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="loadXssTestCase('dom', 'img')">
                                <i class="fas fa-file-image me-1"></i>img触发
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="loadXssTestCase('dom', 'input')">
                                <i class="fas fa-keyboard me-1"></i>自动聚焦
                            </button>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="section">
                        <button class="btn btn-outline-secondary w-100 py-2" onclick="clearOutput()">
                            <i class="fas fa-trash-alt me-2"></i>清空结果
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧输出区域 -->
        <div class="col-md-8 col-lg-9 main-content main-panel">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-scroll me-2"></i>
                        <h5 class="mb-0 fw-bold">测试结果展示</h5>
                    </div>
                    <div>
                            <span id="statusIndicator" class="badge bg-secondary">
                                <i class="fas fa-circle-notch fa-spin me-1"></i>就绪
                            </span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="outputContainer" class="output-container">
                        <div class="welcome-message text-center text-muted d-flex flex-column justify-content-center align-items-center h-100">
                            <i class="fas fa-bug fa-4x mb-4 text-primary"></i>
                            <h4 class="fw-bold text-dark">欢迎使用XSS漏洞测试平台</h4>
                            <p class="mb-0 lead">请选择左侧测试类型并输入测试内容开始XSS漏洞测试</p>
                            <div class="mt-4">
                                <i class="fas fa-mouse-pointer text-muted"></i>
                                <small class="ms-2">支持存储型、反射型、DOM型三种XSS测试</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 加载指示器 -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">测试中...</span>
    </div>
    <p class="mt-3 text-white fw-medium">XSS测试执行中，请稍候...</p>
</div>

<!-- JavaScript资源 -->
<script th:src="@{/js/xss-vuln.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
