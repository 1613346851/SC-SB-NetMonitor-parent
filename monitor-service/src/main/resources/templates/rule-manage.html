<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则管理 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>

        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <h2>规则管理</h2>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="showAddRuleModal()">+ 新增规则</button>
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                </div>
            </header>

            <main class="content">
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">规则名称</label>
                            <input type="text" class="form-control" id="ruleName" placeholder="请输入规则名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">攻击类型</label>
                            <select class="form-control" id="attackType">
                                <option value="">全部</option>
                                <option value="SQL_INJECTION">SQL 注入</option>
                                <option value="XSS">XSS 攻击</option>
                                <option value="COMMAND_INJECTION">命令注入</option>
                                <option value="DDOS">DDoS 攻击</option>
                                <option value="PATH_TRAVERSAL">路径遍历</option>
                                <option value="FILE_INCLUSION">文件包含</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">启用状态</label>
                            <select class="form-control" id="enabled">
                                <option value="">全部</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchRules()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">攻击规则</h3>
                    </div>
                    <div class="table-wrapper" style="position: relative;">
                        <table class="data-table has-fixed-action">
                            <thead>
                                <tr>
                                    <th data-sort="id" style="min-width: 60px;">ID</th>
                                    <th data-sort="ruleName" style="min-width: 120px;">规则名称</th>
                                    <th data-sort="attackType" style="min-width: 100px;">攻击类型</th>
                                    <th style="min-width: 200px;">规则表达式</th>
                                    <th data-sort="riskLevel" style="min-width: 100px;">风险等级</th>
                                    <th data-sort="enabled" style="min-width: 100px;">启用状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="ruleTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="ruleModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 700px;">
            <div class="modal-header">
                <h3 class="modal-title" id="ruleModalTitle">新增规则</h3>
                <span class="modal-close" onclick="closeRuleModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="ruleForm">
                    <input type="hidden" id="ruleId">
                    <div class="form-group">
                        <label class="form-label">规则名称 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="ruleNameInput" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">攻击类型 <span style="color: red;">*</span></label>
                        <select class="form-control" id="attackTypeInput" required>
                            <option value="">请选择</option>
                            <option value="SQL_INJECTION">SQL 注入</option>
                            <option value="XSS">XSS 攻击</option>
                            <option value="COMMAND_INJECTION">命令注入</option>
                            <option value="DDOS">DDoS 攻击</option>
                            <option value="PATH_TRAVERSAL">路径遍历</option>
                            <option value="FILE_INCLUSION">文件包含</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">规则表达式 <span style="color: red;">*</span></label>
                        <textarea class="form-control" id="ruleExpressionInput" rows="3" required placeholder="支持正则表达式"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">风险等级 <span style="color: red;">*</span></label>
                        <select class="form-control" id="riskLevelInput" required>
                            <option value="">请选择</option>
                            <option value="HIGH">高风险</option>
                            <option value="MEDIUM">中风险</option>
                            <option value="LOW">低风险</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">置信度阈值</label>
                        <input type="number" class="form-control" id="confidenceThresholdInput" value="60" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label">启用状态</label>
                        <select class="form-control" id="enabledInput">
                            <option value="1">启用</option>
                            <option value="0">禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeRuleModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRule()">保存</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/core/table-utils.js}"></script>
    <script th:src="@{/js/components/pagination.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/rule-manage.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
