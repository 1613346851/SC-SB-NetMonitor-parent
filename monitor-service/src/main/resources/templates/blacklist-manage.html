<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑名单管理 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"></div>
                <h1 class="sidebar-title">网络监测系统</h1>
            </div>
            <nav class="sidebar-menu">
                <a href="/" class="menu-item">
                    <span class="menu-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/traffic" class="menu-item">
                    <span class="menu-icon">🌐</span>
                    <span>流量列表</span>
                </a>
                <a href="/attack" class="menu-item">
                    <span class="menu-icon">⚠️</span>
                    <span>攻击监测</span>
                </a>
                <a href="/vulnerability" class="menu-item">
                    <span class="menu-icon">🔓</span>
                    <span>漏洞监测</span>
                </a>
                <a href="/defense" class="menu-item">
                    <span class="menu-icon">🛡️</span>
                    <span>防御日志</span>
                </a>
                <a href="/rule" class="menu-item">
                    <span class="menu-icon">📋</span>
                    <span>规则管理</span>
                </a>
                <a href="/blacklist" class="menu-item active">
                    <span class="menu-icon">🚫</span>
                    <span>黑名单管理</span>
                </a>
                <a href="/config" class="menu-item">
                    <span class="menu-icon">⚙️</span>
                    <span>系统配置</span>
                </a>
                <a href="/report" class="menu-item">
                    <span class="menu-icon">📈</span>
                    <span>数据报表</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-container">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-left">
                    <h2>黑名单管理</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">A</div>
                        <span>管理员</span>
                    </div>
                    <button class="btn btn-primary" onclick="showAddBlacklistModal()">+ 添加 IP</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <main class="content">
                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">IP 地址</label>
                            <input type="text" class="form-control" id="ipAddress" placeholder="请输入 IP 地址">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchBlacklist()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 表格 -->
                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">IP 黑名单</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>IP 地址</th>
                                    <th>拉黑原因</th>
                                    <th>过期时间</th>
                                    <th>剩余时间</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="blacklistTableBody">
                                <tr>
                                    <td colspan="8" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 添加黑名单模态框 -->
    <div id="blacklistModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title">添加 IP 到黑名单</h3>
                <span class="modal-close" onclick="closeBlacklistModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="blacklistForm">
                    <div class="form-group">
                        <label class="form-label">IP 地址 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="ipInput" required placeholder="请输入 IP 地址">
                    </div>
                    <div class="form-group">
                        <label class="form-label">拉黑原因</label>
                        <textarea class="form-control" id="reasonInput" rows="3" placeholder="请输入拉黑原因"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">过期时长（相对时长）</label>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px;">
                            <div>
                                <input type="number" class="form-control" id="expireYears" min="0" max="99" placeholder="年">
                            </div>
                            <div>
                                <input type="number" class="form-control" id="expireMonths" min="0" max="11" placeholder="月">
                            </div>
                            <div>
                                <input type="number" class="form-control" id="expireDays" min="0" max="30" placeholder="日">
                            </div>
                            <div>
                                <input type="number" class="form-control" id="expireHours" min="0" max="23" placeholder="时">
                            </div>
                            <div>
                                <input type="number" class="form-control" id="expireMinutes" min="0" max="59" placeholder="分">
                            </div>
                            <div>
                                <input type="number" class="form-control" id="expireSeconds" min="0" max="59" placeholder="秒">
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="permanentBlacklist">
                            <label for="permanentBlacklist" style="margin: 0; font-size: 14px;">永久拉黑</label>
                        </div>
                        <small id="expireTimeHint" style="color: var(--text-secondary); display: block; margin-top: 8px;">
                            留空或全部为0表示使用默认时长（加载中...）
                        </small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeBlacklistModal()">取消</button>
                <button class="btn btn-primary" onclick="saveBlacklist()">保存</button>
            </div>
        </div>
    </div>

    <!-- 延长封禁时间模态框 -->
    <div id="extendModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 500px;">
            <div class="modal-header">
                <h3>延长封禁时间</h3>
                <span class="modal-close" onclick="closeExtendModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="extendIpInput">
                <div class="form-group">
                    <label class="form-label">IP 地址</label>
                    <input type="text" class="form-control" id="extendIpDisplay" disabled style="background: #f5f5f5;">
                </div>
                <div class="form-group">
                    <label class="form-label">延长时间</label>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                        <div>
                            <input type="number" class="form-control" id="extendExpireYears" min="0" max="99" placeholder="年">
                        </div>
                        <div>
                            <input type="number" class="form-control" id="extendExpireMonths" min="0" max="11" placeholder="月">
                        </div>
                        <div>
                            <input type="number" class="form-control" id="extendExpireDays" min="0" max="30" placeholder="天">
                        </div>
                        <div>
                            <input type="number" class="form-control" id="extendExpireHours" min="0" max="23" placeholder="小时">
                        </div>
                        <div>
                            <input type="number" class="form-control" id="extendExpireMinutes" min="0" max="59" placeholder="分钟">
                        </div>
                        <div>
                            <input type="number" class="form-control" id="extendExpireSeconds" min="0" max="59" placeholder="秒">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeExtendModal()">取消</button>
                <button class="btn btn-primary" onclick="extendBlacklist()">确定</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/blacklist-manage.js}"></script>
</body>
</html>
