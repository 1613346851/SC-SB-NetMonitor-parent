<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无访问权限 - 网络监测系统</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .forbidden-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .forbidden-box {
            background: white;
            border-radius: 16px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        .forbidden-icon {
            font-size: 80px;
            margin-bottom: 24px;
        }
        .forbidden-title {
            font-size: 28px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 16px;
        }
        .forbidden-message {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .forbidden-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .forbidden-actions .btn {
            padding: 12px 32px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="forbidden-container">
        <div class="forbidden-box">
            <div class="forbidden-icon">🚫</div>
            <h1 class="forbidden-title">无访问权限</h1>
            <p class="forbidden-message" th:text="${message} ?: '您没有权限访问此页面，请联系管理员获取相应权限。'">
                您没有权限访问此页面，请联系管理员获取相应权限。
            </p>
            <div class="forbidden-actions">
                <a href="/" class="btn btn-primary">返回首页</a>
                <a href="javascript:history.back()" class="btn btn-default">返回上页</a>
            </div>
        </div>
    </div>
</body>
</html>
