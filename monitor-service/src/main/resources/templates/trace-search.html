<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溯源查询 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>

        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <div th:replace="~{fragments/common :: mobileMenuToggle}"></div>
                    <h2>溯源查询</h2>
                </div>
                <div class="header-right">
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                </div>
            </header>

            <main class="content">
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">IP地址</label>
                            <input type="text" class="form-control" id="searchIp" placeholder="请输入IP地址">
                        </div>
                        <div class="form-group">
                            <label class="form-label">攻击类型</label>
                            <select class="form-control" id="attackType">
                                <option value="">全部</option>
                                <option value="DDOS">DDoS 攻击</option>
                                <option value="SQL_INJECTION">SQL 注入</option>
                                <option value="XSS">XSS 攻击</option>
                                <option value="COMMAND_INJECTION">命令注入</option>
                                <option value="PATH_TRAVERSAL">路径遍历</option>
                                <option value="RATE_LIMIT">限流触发</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">风险等级</label>
                            <select class="form-control" id="riskLevel">
                                <option value="">全部</option>
                                <option value="CRITICAL">严重</option>
                                <option value="HIGH">高风险</option>
                                <option value="MEDIUM">中风险</option>
                                <option value="LOW">低风险</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">开始时间</label>
                            <input type="datetime-local" class="form-control" id="startTime">
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束时间</label>
                            <input type="datetime-local" class="form-control" id="endTime">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchTraces()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                    <div class="quick-search">
                        <span class="quick-label">快捷筛选：</span>
                        <button class="quick-btn active" onclick="quickSearch('today', event)">今天</button>
                        <button class="quick-btn" onclick="quickSearch('yesterday', event)">昨天</button>
                        <button class="quick-btn" onclick="quickSearch('week', event)">近7天</button>
                        <button class="quick-btn" onclick="quickSearch('month', event)">近30天</button>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">攻击记录</h3>
                    </div>
                    <div class="table-wrapper" style="position: relative;">
                        <table class="data-table has-fixed-action">
                            <thead>
                                <tr>
                                    <th data-sort="createTime" style="min-width: 140px;">时间</th>
                                    <th data-sort="sourceIp" style="min-width: 120px;">来源IP</th>
                                    <th data-sort="attackType" style="min-width: 100px;">攻击类型</th>
                                    <th style="min-width: 200px;">目标URI</th>
                                    <th data-sort="riskLevel" style="min-width: 100px;">风险等级</th>
                                    <th data-sort="handled" style="min-width: 100px;">处理状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="traceTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/core/table-utils.js}"></script>
    <script th:src="@{/js/components/pagination.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/trace-search.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
