<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

                <a href="/" class="menu-item">
                    <span class="menu-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/traffic" class="menu-item">
                    <span class="menu-icon">🌐</span>
                    <span>流量列表</span>
                </a>
                <a href="/attack" class="menu-item">
                    <span class="menu-icon">⚠️</span>
                    <span>攻击监测</span>
                </a>
                <a href="/vulnerability" class="menu-item">
                    <span class="menu-icon">🔓</span>
                    <span>漏洞监测</span>
                </a>
                <a href="/scan" class="menu-item">
                    <span class="menu-icon">SC</span>

                </a>
                <a href="/defense" class="menu-item">
                    <span class="menu-icon">🛡️</span>

                    <span>防御日志</span>
                </a>
                <a href="/rule" class="menu-item">

                </a>

                    <span>黑名单管理</span>

                    <span>系统配置</span>

                <div class="menu-group-title">系统管理</div>
                <a href="/system/user" class="menu-item">

                    <span>用户管理</span>
                </a>
                <a href="/system/role" class="menu-item">
                    <span class="menu-icon">🔑</span>
                    <span>角色管理</span>
                </a>
                <a href="/system/log" class="menu-item">
                    <span class="menu-icon">📝</span>
                    <span>操作日志</span>
                </a>
            </nav>
        </aside>

        <div class="user-info user-dropdown">
            <div class="user-avatar">A</div>
            <span class="user-name">管理员</span>
            <div class="user-dropdown-menu">
                <a class="user-dropdown-item" href="/profile">
                    <span>👤 个人中心</span>
                </a>
                <div class="user-dropdown-divider"></div>
                <a class="user-dropdown-item logout-btn">
                    <span>🚪 退出登录</span>
                </a>
            </div>
