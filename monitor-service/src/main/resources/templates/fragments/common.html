<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
    <div class="sidebar-overlay"></div>
    
    <th:block th:fragment="sidebar">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo" id="sidebarLogo" title="网络监测系统 - 雷达节点"></div>
                <h1 class="sidebar-title">网络监测系统</h1>
                <button class="sidebar-close" id="sidebarClose" title="关闭菜单">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-toggle-wrapper">
                <button class="sidebar-toggle" id="sidebarToggle" title="折叠侧边栏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                    <span>收起菜单</span>
                </button>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu">
            </nav>
        </aside>
    </th:block>
    
    <th:block th:fragment="mobileMenuToggle">
        <button class="mobile-menu-toggle" id="mobileMenuToggle">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </th:block>
    
    <th:block th:fragment="userDropdown">
        <div class="header-right-actions">
            <div class="user-info user-dropdown">
                <div class="user-avatar">U</div>
                <span class="user-name">系统管理员</span>
                <div class="user-dropdown-menu">
                    <a class="user-dropdown-item" href="/profile">
                        <span>👤 个人中心</span>
                    </a>
                    <div class="user-dropdown-divider"></div>
                    <a class="user-dropdown-item logout-btn">
                        <span>🚪 退出登录</span>
                    </a>
                </div>
            </div>
            <div class="notification-toggle" id="notificationToggle" title="显示/隐藏告警通知">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
            </div>
        </div>
    </th:block>
</body>
</html>
