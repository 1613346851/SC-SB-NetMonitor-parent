<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白名单管理 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>

        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <div th:replace="~{fragments/common :: mobileMenuToggle}"></div>
                    <h2>白名单管理</h2>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="showAddWhitelistModal()">+ 新增白名单</button>
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                </div>
            </header>

            <main class="content">
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">白名单类型</label>
                            <select class="form-control" id="whitelistType">
                                <option value="">全部</option>
                                <option value="PATH">路径白名单</option>
                                <option value="HEADER">请求头白名单</option>
                                <option value="IP">IP白名单</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">白名单值</label>
                            <input type="text" class="form-control" id="whitelistValue" placeholder="请输入白名单值">
                        </div>
                        <div class="form-group">
                            <label class="form-label">启用状态</label>
                            <select class="form-control" id="enabled">
                                <option value="">全部</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchWhitelists()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">检测白名单</h3>
                        <div class="table-actions">
                            <button class="btn btn-sm btn-default" onclick="refreshWhitelistCache()">
                                <span>刷新缓存</span>
                            </button>
                        </div>
                    </div>
                    <div class="table-wrapper" style="position: relative;">
                        <table class="data-table has-fixed-action">
                            <thead>
                                <tr>
                                    <th style="min-width: 60px;">ID</th>
                                    <th style="min-width: 100px;">白名单类型</th>
                                    <th style="min-width: 200px;">白名单值</th>
                                    <th style="min-width: 200px;">描述</th>
                                    <th style="min-width: 80px;">优先级</th>
                                    <th style="min-width: 100px;">启用状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="whitelistTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="whitelistModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="whitelistModalTitle">新增白名单</h3>
                <span class="modal-close" onclick="closeWhitelistModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="whitelistForm">
                    <input type="hidden" id="whitelistId">
                    <div class="form-group">
                        <label class="form-label">白名单类型 <span style="color: red;">*</span></label>
                        <select class="form-control" id="whitelistTypeInput" required>
                            <option value="">请选择</option>
                            <option value="PATH">路径白名单</option>
                            <option value="HEADER">请求头白名单</option>
                            <option value="IP">IP白名单</option>
                        </select>
                        <small class="form-hint">路径白名单：跳过URL路径检测；请求头白名单：跳过指定请求头检测；IP白名单：跳过IP检测</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">白名单值 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="whitelistValueInput" required placeholder="如：/target/page/* 或 Accept">
                        <small class="form-hint">路径支持通配符 * ，如 /target/page/* 匹配所有子路径</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="descriptionInput" rows="2" placeholder="白名单描述（可选）"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">优先级</label>
                        <input type="number" class="form-control" id="priorityInput" value="100" min="1" max="1000">
                        <small class="form-hint">数字越小优先级越高</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">启用状态</label>
                        <select class="form-control" id="enabledInput">
                            <option value="1">启用</option>
                            <option value="0">禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeWhitelistModal()">取消</button>
                <button class="btn btn-primary" onclick="saveWhitelist()">保存</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/core/table-utils.js}"></script>
    <script th:src="@{/js/components/pagination.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/whitelist-manage.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
