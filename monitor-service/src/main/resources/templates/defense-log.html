<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防御日志 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"></div>
                <h1 class="sidebar-title">网络监测系统</h1>
            </div>
            <nav class="sidebar-menu">
                <a href="/" class="menu-item">
                    <span class="menu-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/traffic" class="menu-item">
                    <span class="menu-icon">🌐</span>
                    <span>流量列表</span>
                </a>
                <a href="/attack" class="menu-item">
                    <span class="menu-icon">⚠️</span>
                    <span>攻击监测</span>
                </a>
                <a href="/vulnerability" class="menu-item">
                    <span class="menu-icon">🔓</span>
                    <span>漏洞监测</span>
                </a>
                <a href="/defense" class="menu-item active">
                    <span class="menu-icon">🛡️</span>
                    <span>防御日志</span>
                </a>
                <a href="/rule" class="menu-item">
                    <span class="menu-icon">📋</span>
                    <span>规则管理</span>
                </a>
                <a href="/blacklist" class="menu-item">
                    <span class="menu-icon">🚫</span>
                    <span>黑名单管理</span>
                </a>
                <a href="/config" class="menu-item">
                    <span class="menu-icon">⚙️</span>
                    <span>系统配置</span>
                </a>
                <a href="/report" class="menu-item">
                    <span class="menu-icon">📈</span>
                    <span>数据报表</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-container">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-left">
                    <h2>防御日志</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">A</div>
                        <span>管理员</span>
                    </div>
                </div>
            </header>

            <!-- 内容区域 -->
            <main class="content">
                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">源 IP</label>
                            <input type="text" class="form-control" id="sourceIp" placeholder="请输入源 IP">
                        </div>
                        <div class="form-group">
                            <label class="form-label">防御类型</label>
                            <select class="form-control" id="defenseType">
                                <option value="">全部</option>
                                <option value="IP_BLOCK">封禁 IP</option>
                                <option value="RATE_LIMIT">限流</option>
                                <option value="MALICIOUS_REQUEST">拦截请求</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">开始日期</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束日期</label>
                            <input type="date" class="form-control" id="endDate">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchDefenseLogs()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 表格 -->
                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">防御日志</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>防御时间</th>
                                    <th>源 IP</th>
                                    <th>防御类型</th>
                                    <th>关联攻击 ID</th>
                                    <th>防御结果</th>
                                    <th>操作人</th>
                                    <th>备注</th>
                                </tr>
                            </thead>
                            <tbody id="defenseTableBody">
                                <tr>
                                    <td colspan="8" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/defense-log.js}"></script>
</body>
</html>
