<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 网络监测系统</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>
        
        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <h2>用户管理</h2>
                </div>
                <div class="header-right">
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                </div>
            </header>
            
            <main class="content">
                <div class="card">
                    <div class="card-header">
                        <div class="search-bar">
                            <input type="text" id="searchUsername" class="form-control" placeholder="用户名">
                            <select id="searchStatus" class="form-control">
                                <option value="">全部状态</option>
                                <option value="0">正常</option>
                                <option value="1">禁用</option>
                                <option value="2">锁定</option>
                            </select>
                            <button class="btn btn-primary" onclick="searchUsers()">搜索</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                        <button class="btn btn-success" onclick="showAddModal()">+ 新增用户</button>
                    </div>
                    
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>昵称</th>
                                <th>手机号</th>
                                <th>邮箱</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="8" class="text-center">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
    
    <div class="modal" id="userModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增用户</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">用户名 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formUsername" required>
                        </div>
                        <div class="form-group" id="passwordGroup">
                            <label class="form-label">密码 <span class="required">*</span></label>
                            <input type="password" class="form-control" id="formPassword">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">昵称</label>
                            <input type="text" class="form-control" id="formNickname">
                        </div>
                        <div class="form-group">
                            <label class="form-label">手机号</label>
                            <input type="text" class="form-control" id="formPhone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="formEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">分配角色</label>
                        <div id="roleCheckboxes" class="checkbox-group"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="formRemark" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="resetPwdModal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">重置密码</h3>
                <button class="modal-close" onclick="closeResetPwdModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="resetUserId">
                <div class="form-group">
                    <label class="form-label">新密码 <span class="required">*</span></label>
                    <input type="password" class="form-control" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码 <span class="required">*</span></label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeResetPwdModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmResetPwd()">确认重置</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/user-manage.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
