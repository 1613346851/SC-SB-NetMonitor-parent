<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色管理 - 网络监测系统</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>
        
        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <h2>角色管理</h2>
                </div>
                <div class="header-right">
                    <button class="btn btn-success" onclick="showAddModal()">+ 新增角色</button>
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                </div>
            </header>
            
            <main class="content">
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">角色名称</label>
                            <input type="text" id="searchRoleName" class="form-control" placeholder="请输入角色名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">状态</label>
                            <select id="searchStatus" class="form-control">
                                <option value="">全部状态</option>
                                <option value="0">正常</option>
                                <option value="1">禁用</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchRoles()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">角色列表</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th data-sort="id">ID</th>
                                    <th data-sort="roleName">角色名称</th>
                                    <th>角色编码</th>
                                    <th>描述</th>
                                    <th data-sort="status">状态</th>
                                    <th data-sort="createTime">创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="roleTableBody">
                                <tr><td colspan="7" class="text-center">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div class="modal" id="roleModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增角色</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="roleForm">
                    <input type="hidden" id="roleId">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">角色名称 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formRoleName" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">角色编码 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="formRoleCode" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" class="form-control" id="formRoleDesc">
                    </div>
                    <div class="form-group">
                        <label class="form-label">菜单权限</label>
                        <div id="menuTree" class="menu-tree"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="formRemark" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/core/table-utils.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/role-manage.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
