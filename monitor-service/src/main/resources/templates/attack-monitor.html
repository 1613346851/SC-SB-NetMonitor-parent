<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攻击监测 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"></div>
                <h1 class="sidebar-title">网络监测系统</h1>
            </div>
            <nav class="sidebar-menu">
                <a href="/" class="menu-item">
                    <span class="menu-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/traffic" class="menu-item">
                    <span class="menu-icon">🌐</span>
                    <span>流量列表</span>
                </a>
                <a href="/attack" class="menu-item active">
                    <span class="menu-icon">⚠️</span>
                    <span>攻击监测</span>
                </a>
                <a href="/vulnerability" class="menu-item">
                    <span class="menu-icon">🔓</span>
                    <span>漏洞监测</span>
                </a>
                <a href="/defense" class="menu-item">
                    <span class="menu-icon">🛡️</span>
                    <span>防御日志</span>
                </a>
                <a href="/rule" class="menu-item">
                    <span class="menu-icon">📋</span>
                    <span>规则管理</span>
                </a>
                <a href="/blacklist" class="menu-item">
                    <span class="menu-icon">🚫</span>
                    <span>黑名单管理</span>
                </a>
                <a href="/report" class="menu-item">
                    <span class="menu-icon">📈</span>
                    <span>数据报表</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-container">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-left">
                    <h2>攻击监测</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">A</div>
                        <span>管理员</span>
                    </div>
                </div>
            </header>

            <!-- 内容区域 -->
            <main class="content">
                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">源 IP</label>
                            <input type="text" class="form-control" id="sourceIp" placeholder="请输入源 IP">
                        </div>
                        <div class="form-group">
                            <label class="form-label">攻击类型</label>
                            <select class="form-control" id="attackType">
                                <option value="">全部</option>
                                <option value="SQL_INJECTION">SQL 注入</option>
                                <option value="XSS">XSS 攻击</option>
                                <option value="COMMAND_INJECTION">命令注入</option>
                                <option value="DDOS">DDoS 攻击</option>
                                <option value="PATH_TRAVERSAL">路径遍历</option>
                                <option value="FILE_INCLUSION">文件包含</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">风险等级</label>
                            <select class="form-control" id="riskLevel">
                                <option value="">全部</option>
                                <option value="HIGH">高风险</option>
                                <option value="MEDIUM">中风险</option>
                                <option value="LOW">低风险</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">处理状态</label>
                            <select class="form-control" id="handled">
                                <option value="">全部</option>
                                <option value="0">未处理</option>
                                <option value="1">已处理</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">开始日期</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束日期</label>
                            <input type="date" class="form-control" id="endDate">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchAttacks()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 表格 -->
                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">攻击记录</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>攻击时间</th>
                                    <th>源 IP</th>
                                    <th>目标 IP</th>
                                    <th>攻击类型</th>
                                    <th>风险等级</th>
                                    <th>置信度</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="attackTableBody">
                                <tr>
                                    <td colspan="9" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 攻击详情模态框 -->
    <div id="attackDetailModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 800px;">
            <div class="modal-header">
                <h3 class="modal-title">攻击详情</h3>
                <span class="modal-close" onclick="closeAttackDetail()">&times;</span>
            </div>
            <div class="modal-body" id="attackDetailContent">
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeAttackDetail()">关闭</button>
                <button class="btn btn-primary" onclick="handleAttack()" id="handleBtn">标记为已处理</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/attack-monitor.js}"></script>
</body>
</html>
