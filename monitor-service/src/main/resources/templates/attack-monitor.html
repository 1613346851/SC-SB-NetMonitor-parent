<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攻击监测 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .event-link {
            color: #4f46e5;
            text-decoration: none;
            font-family: monospace;
        }
        .event-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>

        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <div th:replace="~{fragments/common :: mobileMenuToggle}"></div>
                    <h2>攻击监测</h2>
                </div>
                <div class="header-right">
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                </div>
            </header>

            <main class="content">
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">事件 ID</label>
                            <input type="text" class="form-control" id="eventId" placeholder="输入事件ID筛选" style="width: 160px;">
                        </div>
                        <div class="form-group">
                            <label class="form-label">源 IP</label>
                            <input type="text" class="form-control" id="sourceIp" placeholder="请输入源 IP">
                        </div>
                        <div class="form-group">
                            <label class="form-label">攻击类型</label>
                            <select class="form-control" id="attackType">
                                <option value="">全部</option>
                                <option value="SQL_INJECTION">SQL 注入</option>
                                <option value="XSS">XSS 攻击</option>
                                <option value="COMMAND_INJECTION">命令注入</option>
                                <option value="DDOS">DDoS 攻击</option>
                                <option value="PATH_TRAVERSAL">路径遍历</option>
                                <option value="FILE_INCLUSION">文件包含</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">风险等级</label>
                            <select class="form-control" id="riskLevel">
                                <option value="">全部</option>
                                <option value="CRITICAL">严重</option>
                                <option value="HIGH">高风险</option>
                                <option value="MEDIUM">中风险</option>
                                <option value="LOW">低风险</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">处理状态</label>
                            <select class="form-control" id="handled">
                                <option value="">全部</option>
                                <option value="0">未处理</option>
                                <option value="1">已处理</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">开始日期</label>
                            <input type="date" class="form-control" id="startDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label">结束日期</label>
                            <input type="date" class="form-control" id="endDate">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchAttacks()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">攻击记录</h3>
                    </div>
                    <div class="table-wrapper" style="position: relative;">
                        <table class="data-table has-fixed-action">
                            <thead>
                                <tr>
                                    <th data-sort="id" style="min-width: 60px;">ID</th>
                                    <th data-sort="eventId" style="min-width: 140px;">事件ID</th>
                                    <th data-sort="attackTime" style="min-width: 150px;">攻击时间</th>
                                    <th data-sort="sourceIp" style="min-width: 120px;">源 IP</th>
                                    <th style="min-width: 200px;">目标 URI</th>
                                    <th data-sort="attackType" style="min-width: 100px;">攻击类型</th>
                                    <th data-sort="riskLevel" style="min-width: 100px;">风险等级</th>
                                    <th data-sort="confidence" style="min-width: 80px;">置信度</th>
                                    <th data-sort="handled" style="min-width: 80px;">状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="attackTableBody">
                                <tr>
                                    <td colspan="10" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-container" style="padding: 16px 24px;">
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="attackDetailModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">攻击详情</h3>
                <span class="modal-close" onclick="closeAttackDetail()">&times;</span>
            </div>
            <div class="modal-body" id="attackDetailContent">
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeAttackDetail()">关闭</button>
                <button class="btn btn-info" onclick="viewEventDetail()" id="viewEventBtn" style="display: none;">查看事件</button>
                <button class="btn btn-primary" onclick="handleAttack()" id="handleBtn">标记为已处理</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/core/resource-loader.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/core/table-utils.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/components/pagination.js}"></script>
    <script th:src="@{/js/components/data-update-handler.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/attack-monitor.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
