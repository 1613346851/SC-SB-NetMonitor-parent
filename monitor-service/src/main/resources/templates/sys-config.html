<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/common :: sidebar}"></div>

        <div class="main-container">
            <header class="header">
                <div class="header-left">
                    <h2>系统配置</h2>
                </div>
                <div class="header-right">
                    <div th:replace="~{fragments/common :: userDropdown}"></div>
                    <button class="btn btn-default" onclick="refreshConfig()">刷新缓存</button>
                    <button class="btn btn-primary" onclick="showAddConfigModal()">+ 添加配置</button>
                </div>
            </header>

            <main class="content">
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">配置键</label>
                            <input type="text" class="form-control" id="configKey" placeholder="请输入配置键">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchConfig()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">系统配置列表</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>配置键</th>
                                    <th>配置值</th>
                                    <th>描述</th>
                                    <th>创建时间</th>
                                    <th>更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="configTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="configModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加配置</h3>
                <span class="modal-close" onclick="closeConfigModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="configForm">
                    <input type="hidden" id="configId">
                    <div class="form-group">
                        <label class="form-label">配置键 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="configKeyInput" required placeholder="请输入配置键，如：ddos.threshold">
                        <small style="color: var(--text-secondary);">配置键唯一，用于标识配置项</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">配置值 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="configValueInput" required placeholder="请输入配置值">
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="descriptionInput" rows="3" placeholder="请输入配置描述"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/core/config.js}"></script>
    <script th:src="@{/js/utils/storage.js}"></script>
    <script th:src="@{/js/utils/date.js}"></script>
    <script th:src="@{/js/utils/message.js}"></script>
    <script th:src="@{/js/utils/validator.js}"></script>
    <script th:src="@{/js/core/http.js}"></script>
    <script th:src="@{/js/core/auth.js}"></script>
    <script th:src="@{/js/core/page-init.js}"></script>
    <script th:src="@{/js/components/modal.js}"></script>
    <script th:src="@{/js/components/table.js}"></script>
    <script th:src="@{/js/components/pagination.js}"></script>
    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/sys-config.js}"></script>
    <script>
        PageInit.init({
            requireAuth: true,
            highlightMenu: true
        });
    </script>
</body>
</html>
