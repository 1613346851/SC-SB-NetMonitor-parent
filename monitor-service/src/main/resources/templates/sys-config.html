<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - 网络监测系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"></div>
                <h1 class="sidebar-title">网络监测系统</h1>
            </div>
            <nav class="sidebar-menu">
                <a href="/" class="menu-item">
                    <span class="menu-icon">📊</span>
                    <span>仪表盘</span>
                </a>
                <a href="/traffic" class="menu-item">
                    <span class="menu-icon">🌐</span>
                    <span>流量列表</span>
                </a>
                <a href="/attack" class="menu-item">
                    <span class="menu-icon">⚠️</span>
                    <span>攻击监测</span>
                </a>
                <a href="/vulnerability" class="menu-item">
                    <span class="menu-icon">🔓</span>
                    <span>漏洞监测</span>
                </a>
                <a href="/defense" class="menu-item">
                    <span class="menu-icon">🛡️</span>
                    <span>防御日志</span>
                </a>
                <a href="/rule" class="menu-item">
                    <span class="menu-icon">📋</span>
                    <span>规则管理</span>
                </a>
                <a href="/blacklist" class="menu-item">
                    <span class="menu-icon">🚫</span>
                    <span>黑名单管理</span>
                </a>
                <a href="/config" class="menu-item active">
                    <span class="menu-icon">⚙️</span>
                    <span>系统配置</span>
                </a>
                <a href="/report" class="menu-item">
                    <span class="menu-icon">📈</span>
                    <span>数据报表</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-container">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-left">
                    <h2>系统配置</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">A</div>
                        <span>管理员</span>
                    </div>
                    <button class="btn btn-default" onclick="refreshConfig()">刷新缓存</button>
                    <button class="btn btn-primary" onclick="showAddConfigModal()">+ 添加配置</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <main class="content">
                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <div class="form-inline">
                        <div class="form-group">
                            <label class="form-label">配置键</label>
                            <input type="text" class="form-control" id="configKey" placeholder="请输入配置键">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-primary" onclick="searchConfig()">查询</button>
                            <button class="btn btn-default" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 表格 -->
                <div class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">系统配置列表</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>配置键</th>
                                    <th>配置值</th>
                                    <th>描述</th>
                                    <th>创建时间</th>
                                    <th>更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="configTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 添加/编辑配置模态框 -->
    <div id="configModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加配置</h3>
                <span class="modal-close" onclick="closeConfigModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="configForm">
                    <input type="hidden" id="configId">
                    <div class="form-group">
                        <label class="form-label">配置键 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="configKeyInput" required placeholder="请输入配置键，如：ddos.threshold">
                        <small style="color: var(--text-secondary);">配置键唯一，用于标识配置项</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">配置值 <span style="color: red;">*</span></label>
                        <input type="text" class="form-control" id="configValueInput" required placeholder="请输入配置值">
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="descriptionInput" rows="3" placeholder="请输入配置描述"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/utils.js}"></script>
    <script th:src="@{/js/sys-config.js}"></script>
</body>
</html>
