# 网关服务核心配置
server:
  # 网关服务端口（统一入口）
  port: 9000
  # 响应式Web应用类型（必须配置，适配WebFlux）
  servlet:
    context-path: /

# 跨服务安全配置
cross-service:
  security:
    # 签名密钥（必须与监测服务一致，生产环境请修改）
    secret-key: "NetMonitor2026CrossServiceSecretKey!@#$%"
  auth:
    # 调用监测服务的 Token
    monitor-token: MonitorSecureToken456
    # 接收监测服务指令的验证 Token
    verify-token: NetMonitor2026SecureToken
    # 监测服务 IP 地址（用于日志记录）
    monitor-ip: 127.0.0.1

# 微服务基础配置
spring:
  application:
    name: gateway-service
  
  # WebFlux配置（关闭Spring MVC自动配置）
  main:
    web-application-type: reactive
  
  # Gateway核心配置
  cloud:
    gateway:
      # 全局过滤器配置
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      
      # 路由配置
      routes:
        # 靶场服务页面路由（支持 /target/sql-vuln 等直接访问）
        - id: target_page_route
          uri: http://localhost:9001
          predicates:
            - Path=/target/*-vuln
          filters:
            - RewritePath=/target/(?<segment>.*),/target/page/${segment}
            - AddResponseHeader=X-Gateway-Version, 1.0.0
        
        # 靶场服务静态资源路由（lib目录）- 必须在 target_service_route 之前
        - id: target_static_lib_route
          uri: http://localhost:9001
          predicates:
            - Path=/target/lib/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Gateway-Version, 1.0.0
        
        # 靶场服务 API 路由
        - id: target_service_route
          uri: http://localhost:9001
          predicates:
            - Path=/target/**
          filters:
            - StripPrefix=0
            - AddResponseHeader=X-Gateway-Version, 1.0.0
        
        # 静态资源路由
        - id: static_css_route
          uri: http://localhost:9001
          predicates:
            - Path=/css/**
          filters:
            - StripPrefix=0
            - AddResponseHeader=X-Gateway-Version, 1.0.0
        
        - id: static_js_route
          uri: http://localhost:9001
          predicates:
            - Path=/js/**
          filters:
            - StripPrefix=0
            - AddResponseHeader=X-Gateway-Version, 1.0.0
        
        - id: static_favicon_route
          uri: http://localhost:9001
          predicates:
            - Path=/favicon.ico
          filters:
            - StripPrefix=0
            - AddResponseHeader=X-Gateway-Version, 1.0.0
        
        # 网关管理端点路由（可选）
        - id: gateway_management_route
          uri: http://localhost:9000
          predicates:
            - Path=/gateway/**
          filters:
            - StripPrefix=1
      
      # 全局超时配置
      httpclient:
        connect-timeout: 5000
        response-timeout: 60s
        pool:
          max-idle-time: 15s
          max-connections: 1000
          acquire-timeout: 5000
  
  # 缓存配置
  cache:
    type: none  # 网关使用自定义内存缓存，禁用Spring Cache
  
  # JVM配置
  lifecycle:
    timeout-per-shutdown-phase: 30s

# 监控端点配置
management:
  endpoints:
    web:
      exposure:
        include: routes, health, gateway, logfile, metrics, env, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    prometheus:
      enabled: true
  
  # 指标配置
  metrics:
    export:
      prometheus:
        enabled: true
    enable:
      jvm: true
      web:
        server:
          request:
            autotime:
              enabled: true
    tags:
      application: ${spring.application.name}

# 网关告警配置
gateway:
  alert:
    enabled: true
  
  # 监控服务配置
  monitor-service:
    url: http://localhost:9002
  
  # 流量采集配置
  traffic:
    collection:
      enabled: true
      skip-paths:
        - /actuator/**
        - /health
        - /**/*.css
        - /**/*.js
        - /**/*.png
        - /**/*.jpg
        - /**/*.ico
  
  # 防御配置
  defense:
    # 鉴权配置（评估报告 O01 优化项）
    auth:
      # 授权 Token（生产环境应使用更复杂的 Token）
      token: NetMonitor2026SecureToken
      # 允许的监控服务 IP 地址列表（逗号分隔）
      allowed-ips: 127.0.0.1,localhost
    
    # 恶意请求模式配置（评估报告 B03 优化项）
    malicious:
      # 恶意用户代理列表（逗号分隔，小写）
      user-agents: sqlmap,nessus,nmap,burp suite,zaproxy,nikto,w3af,arachni,skipfish,wvs,dirb,gobuster,ffuf,hydra,medusa
      # 恶意 URI 模式列表（逗号分隔，小写）
      uri-patterns: /admin,/manager,/console,/wp-admin,/phpmyadmin,/mysql,/dbadmin,/webdav,/.git/config,/.env,/config/database.yml,/backup,/dump,/export,/download
    
    blacklist:
      enabled: true
      default-expire-minutes: 10
    rate-limit:
      enabled: true
      default-threshold: 10
    malicious-request:
      enabled: true
      
  # 配置同步配置
  config:
    sync:
      enabled: true
      interval: 300000  # 5分钟同步一次
      
  # 缓存配置
  cache:
    cleanup-interval: 60000  # 1分钟清理一次
    
  # 跨域配置
  cors:
    allowed-origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

# 日志配置
logging:
  level:
    com.network.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.web.reactive: INFO
    reactor.netty: INFO
    org.apache.http: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/gateway-service.log
    max-size: 10MB
    max-history: 30